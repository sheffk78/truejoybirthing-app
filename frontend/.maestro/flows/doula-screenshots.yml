appId: com.truejoybirthing.app
---
# Doula Screenshot Flow
# Captures screenshots of all doula-facing screens

- launchApp
- waitFor: 3000

# Welcome screen → tap "I already have an account"
- tapOn: "I already have an account"
- waitFor: 2000

# Login screen — enter doula demo credentials
- tapOn: "Email"
- inputText: "demo.doula@truejoybirthing.com"
- tapOn: "Password"
- inputText: "DemoDoula2024!"
- tapOn: "Log In"
- waitFor: 5000

# Doula Dashboard
- assertVisible: "Dashboard"
- takeScreenshot: doula-dashboard

# Navigate to Clients
- tapOn: "Clients"
- waitFor: 3000
- takeScreenshot: doula-clients

# Navigate to Messages
- tapOn: "Messages"
- waitFor: 3000
- takeScreenshot: doula-messages

# Navigate to Profile
- tapOn: "Profile"
- waitFor: 3000
- takeScreenshot: doula-profile

- stopApp
